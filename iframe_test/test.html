<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    li {
      list-style: none;
    }
    a {
      text-decoration: none;
      color: aliceblue;
    }
    #wrap {
      width: 1000px;
      margin: 0 auto;
      background: #999;
    }

    ul {
      height: 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    li {
      width: 20%;
      height: inherit;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .iframe {
      height: 600px;
      background-color: yellow;
    }
    li:nth-child(1) {
      background-color: red;
    }
    li:nth-child(2) {
      background-color: blue;
    }
    li:nth-child(3) {
      background-color: rgb(255, 81, 0);
    }
    li:nth-child(4) {
      background-color: rgb(255, 0, 13);
    }
    li:nth-child(5) {
      background-color: rgb(0, 255, 64);
    }
  </style>
  <body>
    <h1>iframe연습</h1>
    <div id="wrap">
      <ul>
        <li><a href="red.html" target="color">menu01</a></li>
        <li><a href="#">menu02</a></li>
        <li><a href="#">menu03</a></li>
        <li><a href="#">menu04</a></li>
        <li><a href="#">menu05</a></li>
      </ul>
      <div class="iframe">
        <iframe src="" frameborder="1" width="100%" height="600" name="color"></iframe>
      </div>
    </div>
  </body>
</html>
